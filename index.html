<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth Table</title>
    <link href="./styles.css" rel="stylesheet">
</head>

<body>
    <h1>Truth Table</h1>
    <input type="number" id="numVars" min="2" placeholder="Number of variables">

    <button onclick="generateTable()">Generate Table</button><br>
    <label>
        <input type="radio" name="form" value="SOP" checked>
        Sum of Products
    </label>

    <label>
        <input type="radio" name="form" value="POS">
        Product of Sums
    </label>
    <br><br><br>
    <div id="tableContainer"></div>

    <button onclick="generateExpression()">Generate Boolean Expression</button>

    <p id="result"></p>

    <script src="script.js" defer></script>
</body>

</html>
